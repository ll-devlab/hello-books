<!DOCTYPE html>
<html lang="en">
<head>
    <title>Hello Books</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <meta name="format-detection" content="address=no">
    <meta name="format-detection" content="email=no">
    <meta name="format-detection" content="date=no">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Coiny&display=swap" rel="stylesheet">
    <link rel="apple-touch-icon" href="/assets/icons/app-icon-180.png">

    <script src="script.js" defer></script>
</head>
<body>

<main>

<h1 id="main-title">HELLO BOOKS!</h1>

<seciton id="workspace">
  <div id="word-container">
    <input type="text" id="word-input" placeholder="Type a word" autocomplete="off">
    <button id="speak-word" aria-label="Speak Word">Speak Word</button>
  </div>

<div id="definition-container">
  <button id="get-definition" aria-label="Get Definition">Get Definition</button>
</div>

  <div id="definition-box" aria-live="polite">
  </div>

  <div id="definition-container">
  <button id="speak-definition" aria-label="Speak Definition">Speak Definition</button>
</div>
</seciton>

</main>

<script src="script.js"></script>
</body>
</html>
